<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>S Fashion Hub</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>

<style>
body { 
  font-family: 'Manrope', sans-serif; 
}

/* 🔥 smooth animations */
.fade-in {
  animation: fadeIn 0.8s ease-in-out;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* hero zoom */
.hero-zoom {
  animation: zoomIn 1.2s ease-in-out;
}

@keyframes zoomIn {
  from { transform: scale(1.1); }
  to { transform: scale(1); }
}

/* button bounce */
.btn-anim {
  transition: all 0.3s ease;
}

.btn-anim:hover {
  transform: translateY(-3px) scale(1.05);
}

/* card hover */
.card {
  transition: all 0.4s ease;
}

.card:hover {
  transform: translateY(-8px);
}
</style>
</head>

<body class="bg-white text-slate-900 fade-in">

<!-- HEADER -->
<header class="border-b sticky top-0 bg-white z-50 shadow-sm animate-[fadeIn_0.6s_ease-in-out]">

  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-auto sm:h-20 py-3 flex flex-wrap items-center justify-between gap-3">

    <div class="flex items-center gap-2">
      <span class="material-symbols-outlined text-primary text-3xl sm:text-4xl">bolt</span>
      <h1 class="text-lg sm:text-2xl font-bold">S Fashion Hub</h1>
    </div>

    <nav class="hidden md:flex items-center gap-6">
      <a class="text-sm font-bold text-primary hover:scale-110 transition" href="{% url 'home' %}">Home</a>
      <a class="text-sm font-semibold hover:text-primary hover:scale-110 transition" href="{% url 'about' %}">About</a>
      <a class="text-sm font-semibold hover:text-primary hover:scale-110 transition" href="{% url 'service' %}">Service</a>
    </nav>

    <div class="flex items-center gap-3 w-full sm:w-auto">

      <form method="GET" action="{% url 'product' %}" class="flex w-full sm:w-auto flex-1 sm:flex-none">

        <input type="text"
               name="q"
               placeholder="Search products..."
               class="w-full sm:w-64 p-2 border rounded-l-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary">

        <button class="bg-black text-white px-3 sm:px-4 rounded-r-lg btn-anim">
          🔍
        </button>

      </form>

      <a href="{% url 'dashboard' %}" class="relative hover:scale-110 transition">

        <span class="material-symbols-outlined text-xl sm:text-2xl">
          shopping_cart
        </span>

        <span class="absolute -top-1 -right-1 bg-primary text-white text-[10px] w-4 h-4 rounded-full flex items-center justify-center">
          0
        </span>

      </a>

      <button class="md:hidden btn-anim" onclick="toggleMenu()">
        <span class="material-symbols-outlined">menu</span>
      </button>

    </div>

  </div>

  <!-- MOBILE MENU -->
  <div id="mobileMenu" class="hidden md:hidden px-4 pb-4 space-y-2 border-t animate-[fadeIn_0.4s_ease-in-out]">
    <a href="{% url 'home' %}" class="block py-1">Home</a>
    <a href="{% url 'about' %}" class="block py-1">About</a>
    <a href="{% url 'service' %}" class="block py-1">Service</a>
  </div>

</header>

<!-- MAIN -->
<main class="min-h-screen px-4 sm:px-6 lg:px-8 py-6">
  {% block base %}
  {% endblock %}
</main>

<!-- FOOTER -->
<footer class="bg-gray-100 py-10 mt-10">

  <div class="max-w-7xl mx-auto text-center px-4">

    <div class="flex justify-center items-center gap-2 mb-3">
      <span class="material-symbols-outlined text-primary">bolt</span>
      <h2 class="font-bold">S Fashion Hub</h2>
    </div>

    <p class="text-gray-500 text-sm">
      © 2026 S Fashion Hub
    </p>

  </div>

</footer>

<!-- JS -->
<script>
function toggleMenu() {
  document.getElementById("mobileMenu").classList.toggle("hidden");
}
</script>

</body>
</html>
