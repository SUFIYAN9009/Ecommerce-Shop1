<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>S Fashion Hub</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>

<style>
body { 
  font-family: 'Manrope', sans-serif; 
}

.fade-in {
  animation: fadeIn 0.8s ease-in-out;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.btn-anim {
  transition: all 0.3s ease;
}

.btn-anim:hover {
  transform: translateY(-3px) scale(1.05);
}
</style>

</head>

<body class="bg-white text-slate-900 fade-in">

<!-- HEADER -->
<header class="border-b sticky top-0 bg-white z-50 shadow-sm">

  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-3 flex items-center justify-between">

    <!-- LOGO -->
    <div class="flex items-center gap-2">
      <span class="material-symbols-outlined text-3xl sm:text-4xl">bolt</span>
      <h1 class="text-lg sm:text-2xl font-bold">S Fashion Hub</h1>
    </div>

    <!-- NAV (DESKTOP ONLY) -->
    <nav class="hidden md:flex items-center gap-6">
      <a href="{% url 'home' %}" class="text-sm font-bold hover:scale-110 transition">Home</a>
      <a href="{% url 'about' %}" class="text-sm font-semibold hover:scale-110 transition">About</a>
      <a href="{% url 'service' %}" class="text-sm font-semibold hover:scale-110 transition">Service</a>
    </nav>

    <!-- RIGHT SIDE -->
    <div class="flex items-center gap-3">

      <!-- CART -->
      <a href="{% url 'dashboard' %}" class="relative">
        <span class="material-symbols-outlined text-2xl">shopping_cart</span>
        <span class="absolute -top-1 -right-1 bg-black text-white text-[10px] w-4 h-4 flex items-center justify-center rounded-full">
          0
        </span>
      </a>

      <!-- AUTH BUTTONS -->
      <a href="{% url 'login' %}"
         class="hidden sm:inline-block bg-black text-white px-3 py-2 rounded-lg text-sm btn-anim">
        Login
      </a>

      <a href="{% url 'signup' %}"
         class="hidden sm:inline-block bg-indigo-600 text-white px-3 py-2 rounded-lg text-sm btn-anim">
        Sign Up
      </a>

      <!-- MOBILE MENU BUTTON -->
      <button class="md:hidden" onclick="toggleMenu()">
        <span class="material-symbols-outlined text-3xl">menu</span>
      </button>

    </div>

  </div>

  <!-- MOBILE MENU -->
  <div id="mobileMenu" class="hidden md:hidden px-4 pb-4 border-t bg-white">

    <a href="{% url 'home' %}" class="block py-2">Home</a>
    <a href="{% url 'about' %}" class="block py-2">About</a>
    <a href="{% url 'service' %}" class="block py-2">Service</a>

    <div class="mt-3 border-t pt-3">
      <a href="{% url 'login' %}" class="block py-2">Login</a>
      <a href="{% url 'signup' %}" class="block py-2">Sign Up</a>
    </div>

  </div>

</header>

<!-- MAIN -->
<main class="min-h-screen px-4 sm:px-6 lg:px-8 py-6">
  {% block base %}{% endblock %}
</main>

<!-- FOOTER -->
<footer class="bg-gray-100 py-10 mt-10 text-center">
  <h2 class="font-bold">S Fashion Hub</h2>
  <p class="text-gray-500 text-sm">© 2026 S Fashion Hub</p>
</footer>

<!-- JS -->
<script>
function toggleMenu() {
  document.getElementById("mobileMenu").classList.toggle("hidden");
}
</script>

</body>
</html>
