<!DOCTYPE html>
<html>
<head>
    <title>Edit Product</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-gray-100 to-gray-200 min-h-screen flex items-center justify-center p-6">

<!-- CARD -->
<div class="w-full max-w-3xl bg-white rounded-3xl shadow-xl overflow-hidden">

    <!-- HEADER -->
    <div class="bg-gradient-to-r from-blue-600 to-indigo-600 p-6">
        <h1 class="text-2xl font-bold text-white">Edit Product</h1>
        <p class="text-blue-100 text-sm mt-1">
            Update product details and keep your catalog up to date
        </p>
    </div>

    <!-- FORM -->
    <form method="POST" enctype="multipart/form-data" class="p-8 space-y-6">
        {% csrf_token %}

        <!-- PRODUCT NAME -->
        <div>
            <label class="text-sm font-medium text-gray-700">Product Name</label>
            <input type="text" name="name" value="{{ product.name }}"
                class="w-full mt-2 px-4 py-3 border border-gray-200 rounded-xl
                focus:outline-none focus:ring-4 focus:ring-blue-100 focus:border-blue-500 transition">
        </div>

        <!-- PRICE + STOCK -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">

            <div>
                <label class="text-sm font-medium text-gray-700">Price (PKR)</label>
                <input type="number" name="price" value="{{ product.price }}"
                    class="w-full mt-2 px-4 py-3 border border-gray-200 rounded-xl
                    focus:outline-none focus:ring-4 focus:ring-blue-100 focus:border-blue-500 transition">
            </div>

            <div>
                <label class="text-sm font-medium text-gray-700">Stock</label>
                <input type="number" name="stock" value="{{ product.stock }}"
                    class="w-full mt-2 px-4 py-3 border border-gray-200 rounded-xl
                    focus:outline-none focus:ring-4 focus:ring-blue-100 focus:border-blue-500 transition">
            </div>

        </div>

        <!-- DESCRIPTION -->
        <div>
            <label class="text-sm font-medium text-gray-700">Description</label>
            <textarea name="description" rows="4"
                class="w-full mt-2 px-4 py-3 border border-gray-200 rounded-xl
                focus:outline-none focus:ring-4 focus:ring-blue-100 focus:border-blue-500 transition resize-none">{{ product.description }}</textarea>
        </div>

        <!-- IMAGE UPLOAD -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 items-center">

            <!-- INPUT -->
            <div>
                <label class="text-sm font-medium text-gray-700">Product Image</label>
                <input type="file" name="image"
                    class="w-full mt-2 px-4 py-3 border border-gray-200 rounded-xl bg-gray-50
                    file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0
                    file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
            </div>

            <!-- PREVIEW -->
            {% if product.image %}
            <div class="flex flex-col items-start">
                <p class="text-sm text-gray-500 mb-2">Current Image</p>
                <div class="w-28 h-28 rounded-2xl overflow-hidden border shadow-sm">
                    <img src="{{ product.image.url }}"
                        class="w-full h-full object-cover">
                </div>
            </div>
            {% endif %}

        </div>

        <!-- ACTION BUTTONS -->
        <div class="flex flex-col md:flex-row gap-3 pt-4">

            <button type="submit"
                class="flex-1 bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-xl
                font-semibold shadow-md transition">
                Update Product
            </button>

            <a href="{% url 'product_list' %}"
                class="flex-1 text-center bg-gray-100 hover:bg-gray-200 text-gray-700 py-3 rounded-xl
                font-semibold transition">
                Cancel
            </a>

        </div>

    </form>

</div>

</body>
</html>
